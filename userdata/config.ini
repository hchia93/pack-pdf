# PackPDF persistent config.
# This file lives under userdata/ both in the source repo and next to the
# packaged exe. It is the single source of truth — the app reads from and
# writes back to it in place. Lines starting with # and blank lines are
# ignored by the loader.
#
# Keys (one per line, format `key=value`):
#   folder=    Output folder. Leave blank to fall back to the user's Desktop.
#   theme=     UI theme key (see Theme.cpp for the supported list).

folder=
theme=PhotoshopDark
